name: Rust CI

on:
  push:
    branches: [ "master" ]
    tags: [ "v*" ]

defaults:
  run:
    working-directory: ./src-tauri

jobs:
  check-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install system dependencies (Linux)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            build-essential \
            libglib2.0-dev \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libssl-dev

      - name: Cargo Check
        run: cargo check --verbose

      - name: Cargo Test
        run: cargo test --verbose